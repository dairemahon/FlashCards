{% if latest_flashcard_list %}
    <ul>
    {% for question in latest_flashcard_list %}
        <li><a href="/polls/{{ question.front_text }}/">{{ question.front_text }}</a></li>
    {% endfor %}
    </ul>
{% else %}
    <p>No polls are available.</p>
{% endif %}

{% if user.is_authenticated %}
  <p>Logged in as {{ user.username }}. <a href="{% url 'logout' %}">Log out</a></p>
{% else %}
  <p><a href="{% url 'login' %}">Log in</a> or <a href="{% url 'signup' %}">Sign up</a></p>
{% endif %}
